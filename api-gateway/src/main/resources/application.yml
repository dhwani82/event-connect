server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods: ["GET","POST","PUT","DELETE","OPTIONS"]
            allowedHeaders: "*"
      routes:
        - id: user-service
          uri: http://user-service:8081
          predicates: [Path=/api/users/**]
        - id: vendor-service
          uri: http://vendor-service:8082
          predicates: [Path=/api/vendors/**]
        - id: event-service
          uri: http://event-service:8083
          predicates: [Path=/api/events/**]
        - id: booking-service
          uri: http://booking-service:8084
          predicates: [Path=/api/bookings/**]
        - id: notification-service
          uri: http://notification-service:8085
          predicates: [Path=/api/notifications/**]
